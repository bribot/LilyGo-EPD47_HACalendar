; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
boards_dir = boards

; change to T5-ePaper if you have ESP32-WROVER based device (or use 'pio run -e T5-ePaper')
default_envs = T5-ePaper-S3
src_dir = src

[env]
lib_extra_dirs = ${PROJECT_DIR}
platform = espressif32@6.5.0
framework = arduino
upload_speed = 921600
monitor_speed = 115200
build_flags = 
	-DBOARD_HAS_PSRAM
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DCORE_DEBUG_LEVEL=0
	-Wno-narrowing

monitor_filters = 
	default
	esp32_exception_decoder

lib_deps =
    https://github.com/Xinyuan-LilyGO/LilyGo-EPD47.git
    bitbank2/JPEGDEC @ ^1.2.8
    bitbank2/PNGdec @ ^1.0.1
	bblanchon/ArduinoJson@^7.4.2

board_build.arduino.partitions = huge_app.csv

[env:T5-ePaper-S3]
extends = env
board = T5-ePaper-S3
build_flags = ${env.build_flags}
	-DLILYGO_T5_EPD47_S3
